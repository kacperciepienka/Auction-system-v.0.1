<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Błąd')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-5 text-center" style="max-width: 640px;">
    <div class="display-1 text-success"><i class="bi bi-exclamation-triangle"></i></div>
    <h1 class="h2 fw-bold mt-3" th:text="${status} ?: 'Błąd'">Błąd</h1>
    <p class="text-muted" th:text="${error} ?: 'Wystąpił nieoczekiwany problem'">Wystąpił błąd</p>
    <p class="small text-muted" th:if="${message != null and message != ''}" th:text="${message}"></p>
    <a th:href="@{/}" class="btn btn-success mt-3">
        <i class="bi bi-house"></i> Wróć na stronę główną
    </a>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
