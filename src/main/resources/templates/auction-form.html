<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Wystaw aukcję')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: flashMessages}"></div>

<main class="container py-4" style="max-width: 720px;">
    <div class="detail-card">
        <h1 class="h3 fw-bold mb-1">Wystaw nową aukcję</h1>
        <p class="text-muted mb-4">Wypełnij dane przedmiotu, który chcesz wystawić.</p>

        <div th:if="${error}" class="alert alert-danger">
            <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span>
        </div>

        <form th:action="@{/auctions}" method="post" th:object="${createAuctionRequest}">
            <div class="mb-3">
                <label class="form-label">Tytuł</label>
                <input type="text" th:field="*{title}" class="form-control"
                       th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'"
                       maxlength="100" required/>
                <div class="invalid-feedback" th:errors="*{title}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Opis</label>
                <textarea th:field="*{description}" class="form-control" rows="5"
                          th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'" required></textarea>
                <div class="invalid-feedback" th:errors="*{description}"></div>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-sm-6">
                    <label class="form-label">Kategoria</label>
                    <select th:field="*{auctionCategory}" class="form-select"
                            th:classappend="${#fields.hasErrors('auctionCategory')} ? 'is-invalid'" required>
                        <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat.name()}"></option>
                    </select>
                    <div class="invalid-feedback" th:errors="*{auctionCategory}"></div>
                </div>
                <div class="col-sm-6">
                    <label class="form-label">Cena wywoławcza (PLN)</label>
                    <input type="number" step="0.01" min="0.01" th:field="*{startingPrice}" class="form-control"
                           th:classappend="${#fields.hasErrors('startingPrice')} ? 'is-invalid'" required/>
                    <div class="invalid-feedback" th:errors="*{startingPrice}"></div>
                </div>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success">
                    <i class="bi bi-plus-lg"></i> Wystaw aukcję
                </button>
                <a th:href="@{/}" class="btn btn-outline-secondary">Anuluj</a>
            </div>
        </form>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
