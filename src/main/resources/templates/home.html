<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('AukcjaHub — Aukcje')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: flashMessages}"></div>

<main class="container py-4">
    <div class="d-flex justify-content-between align-items-end mb-4">
        <div>
            <h1 class="h2 fw-bold mb-1">Aukcje</h1>
            <p class="text-muted mb-0">Przeglądaj aktywne aukcje, filtruj po kategorii i cenie, składaj oferty.</p>
        </div>
    </div>

    <!-- ============ FILTRY ============ -->
    <form method="get" th:action="@{/}" class="filters-card mb-4">
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label">Tytuł</label>
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
                    <input type="text" name="title" class="form-control" placeholder="np. PlayStation"
                           th:value="${filterTitle}"/>
                </div>
            </div>
            <div class="col-md-3">
                <label class="form-label">Kategoria</label>
                <select name="category" class="form-select">
                    <option value="">Wszystkie</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat}"
                            th:text="${cat.name()}"
                            th:selected="${filterCategory != null and filterCategory == cat}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">Cena min.</label>
                <input type="number" step="0.01" min="0" name="minPrice"
                       class="form-control" th:value="${filterMinPrice}"/>
            </div>
            <div class="col-md-2">
                <label class="form-label">Cena maks.</label>
                <input type="number" step="0.01" min="0" name="maxPrice"
                       class="form-control" th:value="${filterMaxPrice}"/>
            </div>
            <div class="col-md-1 d-flex align-items-end">
                <button type="submit" class="btn btn-success w-100">
                    <i class="bi bi-funnel"></i>
                </button>
            </div>

            <div class="col-12 d-flex align-items-center gap-2 mt-2">
                <label class="form-label mb-0 me-2">Sortuj:</label>
                <select name="sort" class="form-select form-select-sm w-auto" onchange="this.form.submit()">
                    <option value="startTime,desc" th:selected="${sort == 'startTime,desc'}">Najnowsze</option>
                    <option value="currentPrice,asc" th:selected="${sort == 'currentPrice,asc'}">Cena rosnąco</option>
                    <option value="currentPrice,desc" th:selected="${sort == 'currentPrice,desc'}">Cena malejąco</option>
                    <option value="title,asc" th:selected="${sort == 'title,asc'}">Tytuł A-Z</option>
                    <option value="title,desc" th:selected="${sort == 'title,desc'}">Tytuł Z-A</option>
                    <option value="endTime,asc" th:selected="${sort == 'endTime,asc'}">Koniec najwcześniej</option>
                </select>
                <a th:href="@{/}" class="btn btn-link btn-sm text-muted ms-auto">
                    <i class="bi bi-x-lg"></i> Wyczyść filtry
                </a>
            </div>
        </div>
    </form>

    <!-- ============ LISTA AUKCJI ============ -->
    <div th:if="${auctions.totalElements == 0}" class="empty-state">
        <i class="bi bi-inbox" style="font-size: 2.5rem;"></i>
        <p class="mt-2 mb-0">Brak aukcji spełniających kryteria.</p>
    </div>

    <div th:if="${auctions.totalElements > 0}">
        <div class="text-muted small mb-3">
            Znaleziono <strong th:text="${auctions.totalElements}">0</strong> aukcji
        </div>
        <div class="row g-4">
            <div class="col-md-6 col-lg-4" th:each="a : ${auctions.content}">
                <a th:href="@{/auctions/{ref}(ref=${a.referenceNumber})}" class="text-decoration-none text-reset">
                    <div class="auction-card">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h5 class="card-title mb-0" th:text="${a.title}">Tytuł</h5>
                                <span class="badge"
                                      th:classappend="${a.auctionStatus.name() == 'ACTIVE'} ? 'badge-active' : 'badge-finished'"
                                      th:text="${a.auctionStatus.name() == 'ACTIVE'} ? 'Aktywna' : 'Zakończona'">Aktywna</span>
                            </div>
                            <p class="text-muted small mb-3" style="min-height: 2.6rem;"
                               th:text="${#strings.abbreviate(a.description, 90)}">opis</p>

                            <div class="d-flex gap-2 mb-3 small text-muted flex-wrap">
                                <span><i class="bi bi-tag"></i> <span th:text="${a.auctionCategory.name()}">CAT</span></span>
                                <span th:if="${a.owner != null}">
                                    <i class="bi bi-person"></i> <span th:text="${a.owner.username}">user</span>
                                </span>
                            </div>

                            <div class="mt-auto pt-3 border-top d-flex justify-content-between align-items-end">
                                <div>
                                    <div class="small text-muted">Aktualna cena</div>
                                    <div class="price-tag"
                                         th:text="${#numbers.formatDecimal(a.currentPrice, 1, 'POINT', 2, 'COMMA')} + ' PLN'">0,00 PLN</div>
                                </div>
                                <div class="ref-number" th:text="${a.referenceNumber}">REF-XXX</div>
                            </div>
                        </div>
                    </div>
                </a>
            </div>
        </div>

        <!-- ============ PAGINACJA ============ -->
        <nav th:if="${auctions.totalPages > 1}" class="mt-4 d-flex justify-content-center">
            <ul class="pagination">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/(page=${currentPage - 1}, sort=${sort}, title=${filterTitle}, category=${filterCategory}, minPrice=${filterMinPrice}, maxPrice=${filterMaxPrice})}">
                        <i class="bi bi-chevron-left"></i> Poprzednia
                    </a>
                </li>
                <li class="page-item disabled">
                    <span class="page-link">
                        Strona <strong th:text="${currentPage + 1}">1</strong> z <span th:text="${auctions.totalPages}">1</span>
                    </span>
                </li>
                <li class="page-item" th:classappend="${currentPage + 1 >= auctions.totalPages} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/(page=${currentPage + 1}, sort=${sort}, title=${filterTitle}, category=${filterCategory}, minPrice=${filterMinPrice}, maxPrice=${filterMaxPrice})}">
                        Następna <i class="bi bi-chevron-right"></i>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
